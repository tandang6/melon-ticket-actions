name: Melon Ticket Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: tandang6/melon-ticket-actions
      - name: Run Monitor
        uses: tandang6/melon-ticket-actions@main
        with:
          product-id: '213346'
          schedule-id: '100001'
          seat-id: '10002,10003,10004'
          slack-incoming-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          message: '티켓 취소표가 발견되었습니다!'
